<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishing-Star | Secret Galaxy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="sky"></div>

    <div id="wish-modal">
        <div class="modal-content">
            <h1>Draw Your Star</h1>
            
            <div class="drawing-area">
                <canvas id="drawCanvas" width="300" height="220"></canvas>
            </div>
            
            <div class="input-group">
                <label>STAR NAME</label>
                <div class="input-wrapper">
                    <input type="text" id="star-name" placeholder="Ton pseudo..." required>
                </div>
            </div>

            <div class="input-group">
                <label>CONTACT (Optionnel)</label>
                <div class="input-wrapper">
                    <select id="contact-type" style="background:none; color:white; border:none; font-size:0.7rem;">
                        <option value="insta">Instagram</option>
                        <option value="tiktok">TikTok</option>
                        <option value="wtsp">WhatsApp</option>
                    </select>
                    <input type="text" id="user-contact" placeholder="@toncompte">
                </div>
            </div>

            <div class="input-group">
                <label>YOUR WISH</label>
                <div class="input-wrapper">
                    <textarea id="star-wish" placeholder="Confie ton vœu à l'étoile..."></textarea>
                </div>
            </div>
            
            <div class="launch-zone">
                <button id="btn-lancer" style="background: white; color: #1b2735; border: none; padding: 12px 25px; border-radius: 25px; font-weight: bold; cursor: pointer;">
                    Lancer mon vœu ✨
                </button>
            </div>
        </div>
    </div>

    <div id="wishes-display"></div>

    <script type="module" src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishing-Star | Secret Galaxy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="sky"></div>

    <button class="btn-ouvrir" onclick="ouvrirDessin()">+</button>

    <div id="wish-modal">
        <div class="modal-content" id="modal-container">
            
            <div id="step-drawing">
                <h3>Dessine ton étoile</h3>
                <div class="drawing-area">
                    <canvas id="drawCanvas" width="280" height="200"></canvas>
                </div>
                <button class="btn-next" onclick="passerAuxInfos()">Continuer</button>
            </div>

            <div id="step-infos" style="display:none;">
                <div class="input-group">
                    <label>NOM DE L'ÉTOILE</label>
                    <input type="text" id="star-name" placeholder="Son petit nom...">
                </div>

                <div class="input-group">
                    <label>CONTACT (Privé)</label>
                    <div class="row">
                        <select id="contact-type">
                            <option value="Insta">Instagram</option>
                            <option value="TikTok">TikTok</option>
                            <option value="Wtsp">WhatsApp</option>
                        </select>
                        <input type="text" id="user-contact" placeholder="@pseudo / num">
                    </div>
                </div>

                <div class="input-group">
                    <label>TON VŒU</label>
                    <textarea id="star-wish" placeholder="Confie ton secret..."></textarea>
                </div>
                
                <p class="hint">Tire la fenêtre vers le bas pour lancer ! ↓</p>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>

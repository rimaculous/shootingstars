<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishing-Star | Secret Galaxy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="sky"></div>

    <div id="wish-modal">
        <div class="modal-content">
            <h1>Draw Your Star</h1>
            
            <div class="drawing-area">
                <canvas id="drawCanvas"></canvas>
            </div>
            
            <div class="input-group">
                <label>STAR NAME</label>
                <div class="input-wrapper">
                    <input type="text" id="star-name" placeholder="Ton pseudo..." required>
                </div>
            </div>

            <div class="input-group">
                <label>YOUR WISH</label>
                <div class="input-wrapper">
                    <textarea id="star-wish" placeholder="Confie ton vœu à l'étoile..."></textarea>
                </div>
            </div>
            
            <div class="launch-zone">
                <button onclick="lancerVoeu(document.getElementById('star-name').value, document.getElementById('star-wish').value)" style="background: none; border: 1px solid white; color: white; padding: 10px 20px; border-radius: 20px; cursor: pointer;">
                    Lancer mon vœu ✨
                </button>
            </div>
        </div>
    </div>

    <div id="wishes-display">
        </div>

    <script type="module" src="script.js"></script>

</body>
</html>

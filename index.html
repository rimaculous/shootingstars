<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishing-Star | Secret Galaxy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="main-container">
        <h1>Draw Your Star</h1>
        
        <div class="drawing-area">
            <canvas id="starCanvas" width="300" height="300" style="border: 1px solid #555; background: black; cursor: crosshair;"></canvas>
            <p><small>Dessine ton étoile ci-dessus avant de l'envoyer !</small></p>
        </div>
        
        <div class="wish-input-area">
            <input type="text" id="star-name" placeholder="Ton nom (Star Name)" required>
            <textarea id="your-wish" placeholder="Écris ton vœu ici..." required></textarea>
            
            <button onclick="lancerVoeu(document.getElementById('star-name').value, document.getElementById('your-wish').value)">
                Lancer mon vœu ✨
            </button>
        </div>

        <hr>

        <h2>La Galaxie des Vœux</h2>
        <div id="wishes-display"></div>
    </div>

    <script type="module" src="script.js"></script>

</body>
</html>
